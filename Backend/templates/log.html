<!DOCTYPE html>
<html>

<head>

<title>System Logs</title>

<style>

body{

font-family:Arial;

background:#f4f4f4;

}

.container{

width:1000px;

margin:auto;

}

.card{

background:white;

padding:20px;

margin-top:20px;

border-radius:10px;

box-shadow:0px 0px 10px gray;

}

pre{

background:black;

color:lime;

padding:20px;

overflow:auto;

}

</style>

</head>

<body>

<div class="container">

<h1>Application Logs</h1>

<div class="card">

<pre>

{% for log in logs %}

{{ log }}

{% endfor %}

</pre>

</div>

<a href="/">Back</a>

</div>

</body>

</html>
