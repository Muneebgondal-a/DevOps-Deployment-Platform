<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
        }

        .login{

            width:350px;

            margin:120px auto;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0 0 15px gray;

        }

        input{

            width:100%;

            padding:10px;

            margin-top:10px;

            margin-bottom:15px;

        }

        button{

            width:100%;

            padding:10px;

            background:#0078ff;

            color:white;

            border:none;

            cursor:pointer;

        }

    </style>

</head>

<body>

<div class="login">

<h2>DevOps Control Center</h2>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

</div>

</body>

</html>
