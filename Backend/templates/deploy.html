<!DOCTYPE html>
<html>

<head>

<title>Deployment</title>

<style>

body{

font-family:Arial;

background:#f4f4f4;

}

.container{

width:900px;

margin:auto;

}

.card{

background:white;

padding:20px;

margin-top:20px;

border-radius:10px;

box-shadow:0px 0px 10px gray;

}

</style>

</head>

<body>

<div class="container">

<h1>Deployment Module</h1>

<div class="card">

<h2>Status</h2>

<p>{{ message }}</p>

</div>

<div class="card">

<h2>Server</h2>

<p>{{ server }}</p>

</div>

<div class="card">

<h2>Environment</h2>

<p>{{ env }}</p>

</div>

<div class="card">

<h2>IP Address</h2>

<p>{{ ip }}</p>

</div>

<div class="card">

<h2>Version</h2>

<p>{{ version }}</p>

</div>

<a href="/">Back</a>

</div>

</body>

</html>
