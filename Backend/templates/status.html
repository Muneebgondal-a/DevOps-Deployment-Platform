<!DOCTYPE html>

<html>

<head>
<meta http-equiv="refresh" content="5">
<title>Server Status</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    width:800px;
    margin:auto;
}

.card{

    background:white;

    margin-top:30px;

    padding:20px;

    border-radius:10px;

    box-shadow:0px 0px 8px gray;

}

</style>

</head>

<body>

<div class="container">

<h1>System Monitoring Dashboard</h1>

<div class="card">


<h2>Hostname</h2>

<p>{{ hostname }}</p>

</div>

<div class="card">

<h2>Operating System</h2>

<p>{{ os }}</p>

</div>

<div class="card">

<h2>OS Version</h2>

<p>{{ release }}</p>

</div>
<h2>CPU Usage</h2>

<p>{{ cpu }} %</p>

</div>

<div class="card">

<h2>Memory Usage</h2>

<p>{{ memory }} %</p>

</div>

<div class="card">

<h2>Disk Usage</h2>

<p>{{ disk }} %</p>

</div>

<br>

<a href="/">Back To Dashboard</a>

</div>

</body>

</html>
