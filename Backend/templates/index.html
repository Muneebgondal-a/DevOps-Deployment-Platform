<!DOCTYPE html>
<html>

<head>

    <title>DevOps Deployment Platform</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            margin:40px;
        }

        .container{
            width:1000px;
            margin:auto;
        }

        .card{
            background:white;
            padding:20px;
            margin-top:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        button{
            width:220px;
            padding:12px;
            margin:10px;
            cursor:pointer;
            font-size:16px;
        }

        a{
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="container">

<h1>🚀 DevOps Deployment Platform</h1>

<div class="card">

<h2>Dashboard</h2>

<p><strong>Hostname:</strong> {{ hostname }}</p>

<p><strong>Current Time:</strong> {{ current_time }}</p>

<a href="/deploy">
<button>Deploy Application</button>
</a>

<a href="/status">
<button>Server Status</button>
</a>

<a href="/logs">
<button>View Logs</button>
</a>

</div>

<div class="card">

<h2>Git Information</h2>

<p><strong>Current Branch:</strong> {{ branch }}</p>

<p><strong>Latest Commit:</strong> {{ commit }}</p>

</div>

</div>

</body>

</html>
